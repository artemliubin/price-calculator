<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Калькулятор вартості робіт</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 900px;
            margin: 40px auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th, td {
            border: 1px solid #ddd;
            padding: 8px;
        }

        th {
            background: #f4f4f4;
        }

        input {
            width: 80px;
        }

        button {
            margin-top: 15px;
            padding: 8px 15px;
            cursor: pointer;
        }

        .result {
            margin-top: 25px;
            font-size: 18px;
            font-weight: bold;
        }

        .formula {
            margin-top: 10px;
            font-family: monospace;
            background: #f9f9f9;
            padding: 10px;
            min-height: 24px;
        }

        .copied {
            color: green;
            margin-left: 10px;
        }
    </style>
</head>
<body>

<h2>Калькулятор вартості робіт</h2>

<table>
    <thead>
        <tr>
            <th>Тип робіт</th>
            <th>Тариф (грн/год)</th>
            <th>Години</th>
        </tr>
    </thead>
    <tbody id="workTable"></tbody>
</table>

<button onclick="calculate()">Розрахувати</button>
<button onclick="copyResult()">Скопіювати результат</button>
<span id="copyStatus" class="copied"></span>

<div class="result">
    Загальна сума: <span id="total">0,00</span> грн
</div>

<div class="formula" id="formula"></div>

<script>
    const works = [
        { name: "Управління проектом", rate: 1485.00 },
        { name: "Бізнес аналіз", rate: 1485.00 },
        { name: "Архітектор БД MySQL", rate: 2296.80 },
        { name: "Frontend dev", rate: 1237.50 },
        { name: "Розробка API dev", rate: 1485.00 },
        { name: "Розробка серверних скриптів Backend Dev", rate: 2296.80 },
        { name: "Розробка програмного коду", rate: 1237.50 },
        { name: "Налаштування та впровадження", rate: 1237.50 },
        { name: "Тестування", rate: 825.00 },
        { name: "Документація", rate: 825.00 },
        { name: "UX/UI дизайн", rate: 1155.00 }
    ];

    const table = document.getElementById("workTable");

    works.forEach((work, index) => {
        const row = document.createElement("tr");
        row.innerHTML = `
            <td>${work.name}</td>
            <td>${format(work.rate)}</td>
            <td><input type="number" min="0" step="0.1" id="hours-${index}" value="0"></td>
        `;
        table.appendChild(row);
    });

    function calculate() {
        let total = 0;
        let formulaParts = [];

        works.forEach((work, index) => {
            const hours = parseFloat(document.getElementById(`hours-${index}`).value) || 0;

            if (hours > 0) {
                total += hours * work.rate;
                formulaParts.push(hours + "*" + formatRate(work.rate));
            }
        });

        const formulaText = formulaParts.join("+");
        const formattedTotal = format(total);

        document.getElementById("total").innerText = formattedTotal;

        if (formulaParts.length > 0) {
            document.getElementById("formula").innerText =
                formulaText + "=" + formattedTotal;
        } else {
            document.getElementById("formula").innerText = "";
        }

        document.getElementById("copyStatus").innerText = "";
    }

    function copyResult() {
    let text = "Надання оцінки:";
    text += "\n"; // empty line

    let total = 0;
    let formulaParts = [];

    works.forEach((work, index) => {
        const hours = parseFloat(document.getElementById(`hours-${index}`).value) || 0;

        if (hours > 0) {
            total += hours * work.rate;
            formulaParts.push(hours + "*" + formatRate(work.rate));
            text += work.name + " - " + hours + "\n";
        }
    });

    if (formulaParts.length === 0) return;

    const formula = formulaParts.join("+");
    const formattedTotal = format(total);

    text += "\n"; // empty line
    text += formula + "=" + formattedTotal;
    text += "\n\n"; // empty line
    text += "Загальна сума: " + formattedTotal + " грн";

    navigator.clipboard.writeText(text).then(() => {
        const status = document.getElementById("copyStatus");
        status.innerText = "Скопійовано!";
        setTimeout(() => status.innerText = "", 2000);
    });
}

    function format(number) {
        return number.toLocaleString('uk-UA', {
            minimumFractionDigits: 2,
            maximumFractionDigits: 2
        });
    }

    function formatRate(number) {
        return number.toString().replace(".", ",");
    }
</script>

</body>
</html>
